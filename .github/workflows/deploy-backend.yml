name: SAP Icomp's Deploy

on:
  push:
    branches: [develop, test, main]
    paths:
      - "backend/**"
      - "docker/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}
    runs-on: ubuntu-latest

    env:
      APP_ENV: ${{ vars.ENVIRONMENT }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t sap-icomp-backend-$APP_ENV:latest -f ./backend/Dockerfile.$APP_ENV ./backend

      - name: Export image to tar.gz
        run: |
          docker save sap-icomp-backend-$APP_ENV:latest | gzip > sap-icomp-backend-$APP_ENV.tar.gz

      - name: Generate .env file for the backend
        run: |
          cat <<EOF > .env
          ENVIRONMENT="$APP_ENV"
          BACKEND_PORT="${{ vars.BACKEND_PORT }}"
          DB_PORT="${{ vars.DB_PORT }}"
          DB_NAME="${{ secrets.DB_NAME }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          DB_USER="${{ secrets.DB_USER }}"
          DB_HOST="${{ secrets.SERVER_HOST }}"
          DATABASE_URL="postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.SERVER_HOST }}:${{ vars.DB_PORT }}/${{ secrets.DB_NAME }}?schema=public&sslmode=prefer"
          EOF

      - name: Copy image, compose and env to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "sap-icomp-backend-${{ env.APP_ENV }}.tar.gz,./docker/${{ env.APP_ENV }}/docker-compose.yml,.env"
          target: "/var/www/${{ secrets.HOST_MAIN_FOLDER }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV: ${{ env.APP_ENV }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_ENV
          script: |
            cd /var/www/${{ secrets.HOST_MAIN_FOLDER }}
            chmod 600 .env

            docker compose -f ./docker/$APP_ENV/docker-compose.yml -p sap-icomp-$APP_ENV --env-file .env down

            docker load < sap-icomp-backend-$APP_ENV.tar.gz

            docker compose -f ./docker/$APP_ENV/docker-compose.yml -p sap-icomp-$APP_ENV --env-file .env up -d db backend

            rm -f sap-icomp-backend-$APP_ENV.tar.gz
            docker image prune -f
