name: SAP Icomp's Deploy Frontend

on:
  push:
    branches: [develop, test, main]
    paths:
      - "frontend/**"
      - "docker/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      APP_ENV: ${{ vars.ENVIRONMENT }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t sap-icomp-frontend-$APP_ENV:latest -f ./frontend/Dockerfile.$APP_ENV ./frontend

      - name: Export image to tar.gz
        run: |
          docker save sap-icomp-frontend-$APP_ENV:latest | gzip > sap-icomp-frontend-$APP_ENV.tar.gz

      - name: Generate .env.frontend file for the frontend
        run: |
          cat <<EOF > .env.frontend
          ENVIRONMENT="$APP_ENV"
          FRONTEND_PORT="${{ vars.FRONTEND_PORT }}"
          BACKEND_PORT="${{ vars.BACKEND_PORT }}"
          BACKEND_HOST="${{ secrets.SERVER_HOST }}"
          NEXT_PUBLIC_API_URL="http://${{ secrets.SERVER_HOST }}:${{ vars.BACKEND_PORT }}"
          EOF

      - name: Copy image, compose and env to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "sap-icomp-frontend-${{ env.APP_ENV }}.tar.gz,./docker/${{ env.APP_ENV }}/docker-compose.yml,.env.frontend"
          target: "/var/www/${{ secrets.HOST_MAIN_FOLDER }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV: ${{ env.APP_ENV }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: APP_ENV
          script: |
            cd /var/www/${{ secrets.HOST_MAIN_FOLDER }}
            chmod 600 .env.frontend

            docker compose -f ./docker/$APP_ENV/docker-compose.yml -p sap-icomp-$APP_ENV --env-file .env.frontend stop frontend

            docker load < sap-icomp-frontend-$APP_ENV.tar.gz

            docker compose -f ./docker/$APP_ENV/docker-compose.yml -p sap-icomp-$APP_ENV --env-file .env.frontend up -d frontend

            rm -f sap-icomp-frontend-$APP_ENV.tar.gz
            docker image prune -f
